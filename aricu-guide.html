<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#003D7A" />
<title>ARICU User Guides — Pilot Hospital Onboarding</title>
<meta name="description" content="ARICU pilot hospital onboarding guides for Admin, Doctors, Nurses, Professors. By Dr. Atul Rai, M.D." />

<style>
/* ─────────────────────────────────────────────────────────────
   ARICU FLIPBOOK — designed for clinical credibility
   Typography: Fraunces (display) + Inter Tight (body, but tweaked)
   Palette: clinical navy, monitor green, role-specific accents
   ───────────────────────────────────────────────────────────── */

:root {
  /* Brand palette */
  --navy-900: #001F3D;
  --navy-800: #003D7A;
  --navy-700: #0066CC;
  --navy-500: #4A9FE6;
  --navy-100: #E3F2FD;
  --navy-50:  #F0F7FF;

  --monitor-green: #00FF88;
  --monitor-yellow: #FFEB3B;
  --monitor-cyan: #00BCD4;
  --monitor-orange: #FF9800;

  --medical-green: #00A86B;
  --medical-green-pale: #E8F5E9;
  --medical-green-deep: #006B3F;

  --teal: #00897B;
  --teal-pale: #E0F2F1;
  --teal-light: #4DB6AC;

  --purple: #7B1FA2;
  --purple-pale: #F3E5F5;
  --purple-light: #BA68C8;

  --emergency: #D32F2F;
  --warning: #F57C00;

  --ink: #0A1929;
  --ink-soft: #2A3B4D;
  --grey: #5A6878;
  --grey-light: #A8B2BD;
  --paper: #FCFCFA;
  --paper-shade: #F5F4F0;
  --paper-edge: #E8E6E0;

  /* Type */
  --font-display: "Fraunces", "Iowan Old Style", "Hoefler Text", Georgia, serif;
  --font-body: "Inter Tight", system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", "Courier New", monospace;

  /* Spacing */
  --pad: clamp(20px, 4vw, 48px);
}

@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: #0a0f1a;
  font-family: var(--font-body);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* ─────────────────────────────────────────────────────────────
   AMBIENT BACKGROUND — subtle ICU monitor vibe
   ───────────────────────────────────────────────────────────── */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at top, #102844 0%, transparent 60%),
    radial-gradient(ellipse at bottom right, #0a1f3a 0%, transparent 50%),
    linear-gradient(135deg, #0a0f1a 0%, #0d1424 100%);
  z-index: 0;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0, 255, 136, 0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 255, 136, 0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: 0;
  pointer-events: none;
}

/* ─────────────────────────────────────────────────────────────
   APP CHROME — top bar with branding + controls
   ───────────────────────────────────────────────────────────── */
.app-chrome {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  background: linear-gradient(180deg, rgba(0,15,30,0.95) 0%, rgba(0,15,30,0.7) 100%);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0, 255, 136, 0.15);
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  color: white;
}

.brand-mark {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 22px;
  letter-spacing: -0.5px;
  color: white;
}

.brand-sub {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--monitor-green);
  font-weight: 500;
}

.chrome-right {
  display: flex;
  align-items: center;
  gap: 16px;
  color: white;
  font-size: 12px;
}

.page-indicator {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--monitor-green);
  letter-spacing: 1px;
  padding: 4px 10px;
  border: 1px solid rgba(0, 255, 136, 0.3);
  border-radius: 3px;
  background: rgba(0, 255, 136, 0.05);
}

/* ─────────────────────────────────────────────────────────────
   BOOK CONTAINER
   ───────────────────────────────────────────────────────────── */
.book-stage {
  position: fixed;
  top: 60px;
  bottom: 80px;
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 2400px;
  z-index: 1;
}

.book {
  position: relative;
  width: min(94vw, 1200px);
  height: min(82vh, 800px);
  aspect-ratio: 3 / 2;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* When fewer than two pages visible (mobile), book becomes single page */
@media (max-aspect-ratio: 5/4) {
  .book {
    aspect-ratio: 2 / 3;
  }
}

.page {
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  height: 100%;
  background: var(--paper);
  transform-origin: right center;
  transition: transform 0.9s cubic-bezier(0.65, 0.05, 0.36, 1);
  transform-style: preserve-3d;
  backface-visibility: hidden;
  will-change: transform;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  overflow: hidden;
}

.page.right {
  left: 50%;
  transform-origin: left center;
}

/* Spine gradient on inner edges */
.page.left::after,
.page.right::after {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  width: 30px;
  pointer-events: none;
  z-index: 5;
}
.page.left::after {
  right: 0;
  background: linear-gradient(to right, transparent, rgba(0,0,0,0.18));
}
.page.right::after {
  left: 0;
  background: linear-gradient(to left, transparent, rgba(0,0,0,0.18));
}

/* Flipped state */
.page.left.flipped {
  transform: rotateY(-180deg);
}
.page.right.flipped {
  transform: rotateY(180deg);
}

.page-face {
  position: absolute;
  inset: 0;
  background: var(--paper);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}

.page-face.back {
  transform: rotateY(180deg);
}

/* Subtle paper texture */
.page-face::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(0,0,0,0.012) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.012) 0%, transparent 50%);
  pointer-events: none;
  z-index: 1;
}

.page-content {
  position: absolute;
  inset: 0;
  padding: var(--pad);
  display: flex;
  flex-direction: column;
  z-index: 2;
}

/* Page number footer */
.page-number {
  position: absolute;
  bottom: 16px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--grey-light);
  text-transform: uppercase;
  z-index: 3;
}
.page-face .page-number.left { left: 24px; }
.page-face .page-number.right { right: 24px; }

/* Mini header on content pages */
.page-mini-header {
  position: absolute;
  top: 16px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--grey-light);
  z-index: 3;
}
.page-face .page-mini-header.left { left: 24px; }
.page-face .page-mini-header.right { right: 24px; }

/* ─────────────────────────────────────────────────────────────
   COVER PAGE
   ───────────────────────────────────────────────────────────── */
.cover {
  background: linear-gradient(135deg, var(--navy-900) 0%, var(--navy-800) 50%, #002F5C 100%);
  color: white;
  position: relative;
}

.cover::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
  background-size: 24px 24px;
  z-index: 0;
}

.cover .page-content {
  z-index: 2;
  justify-content: space-between;
  padding: 40px 36px;
}

.cover-corner {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.cover-corner-mark {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 2px;
  color: rgba(0,255,136,0.6);
  text-transform: uppercase;
}

.cover-center {
  text-align: center;
  margin: auto 0;
}

.cover-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(60px, 9vw, 96px);
  line-height: 0.95;
  letter-spacing: -3px;
  color: white;
  margin-bottom: 12px;
  font-variation-settings: "opsz" 144;
}

.cover-tagline {
  font-size: 14px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  font-weight: 500;
  margin-bottom: 32px;
}

.ecg-strip {
  width: 100%;
  height: 60px;
  margin: 24px 0;
}

.ecg-strip svg {
  width: 100%;
  height: 100%;
  display: block;
}

.ecg-line {
  fill: none;
  stroke: var(--monitor-green);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  filter: drop-shadow(0 0 4px rgba(0,255,136,0.6));
  stroke-dasharray: 1000;
  stroke-dashoffset: 1000;
  animation: ecgDraw 3s ease-out forwards 0.3s;
}

@keyframes ecgDraw {
  to { stroke-dashoffset: 0; }
}

.vitals-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin: 24px 0;
}

.vital-chip {
  background: #000;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  padding: 10px 12px;
  text-align: left;
  font-family: var(--font-mono);
  position: relative;
  overflow: hidden;
}

.vital-chip::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(to right, transparent, currentColor, transparent);
  opacity: 0.5;
}

.vital-label {
  font-size: 9px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.vital-value {
  font-size: 22px;
  font-weight: 600;
  line-height: 1;
}

.vital-unit {
  font-size: 9px;
  color: rgba(255,255,255,0.4);
  margin-top: 3px;
}

.vital-hr { color: var(--monitor-green); }
.vital-bp { color: var(--monitor-yellow); }
.vital-spo2 { color: var(--monitor-cyan); }
.vital-rr { color: var(--monitor-orange); }

.cover-bottom {
  text-align: center;
}

.cover-by {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(0,255,136,0.6);
  margin-bottom: 8px;
  text-transform: uppercase;
}

.cover-author {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 34px;
  color: white;
  margin-bottom: 4px;
  letter-spacing: -1px;
}

.cover-credentials {
  font-size: 13px;
  color: var(--monitor-green);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 14px;
}

.cover-role {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  font-style: italic;
  margin-bottom: 24px;
}

.cover-badge {
  display: inline-block;
  background: linear-gradient(135deg, var(--medical-green), var(--medical-green-deep));
  color: white;
  padding: 14px 30px;
  border-radius: 30px;
  margin-top: 8px;
  box-shadow: 0 8px 30px rgba(0,168,107,0.4);
}

.cover-badge-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.cover-badge-terms {
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.5px;
  opacity: 0.95;
}

.cover-contact {
  margin-top: 20px;
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.5px;
}

.cover-contact span {
  color: var(--monitor-green);
}

/* ─────────────────────────────────────────────────────────────
   TOC PAGE
   ───────────────────────────────────────────────────────────── */
.toc-page {
  padding: 60px 50px 50px !important;
}

.toc-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--navy-700);
  margin-bottom: 8px;
}

.toc-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 56px;
  color: var(--navy-900);
  letter-spacing: -2px;
  line-height: 1;
  margin-bottom: 8px;
  font-variation-settings: "opsz" 144;
}

.toc-sub {
  font-size: 14px;
  color: var(--grey);
  margin-bottom: 40px;
  font-style: italic;
}

.toc-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.toc-entry {
  display: grid;
  grid-template-columns: 50px 1fr auto;
  align-items: center;
  padding: 16px 0;
  border-bottom: 1px solid var(--paper-edge);
  cursor: pointer;
  transition: padding-left 0.2s ease, background 0.2s ease;
  position: relative;
}

.toc-entry:hover {
  padding-left: 8px;
  background: linear-gradient(to right, var(--navy-50), transparent);
}

.toc-num {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 28px;
  color: var(--toc-color, var(--navy-700));
  letter-spacing: -1px;
}

.toc-text strong {
  display: block;
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  color: var(--toc-color, var(--navy-800));
  letter-spacing: -0.3px;
  margin-bottom: 2px;
}

.toc-text span {
  font-size: 12px;
  color: var(--grey);
}

.toc-page-num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--grey);
  letter-spacing: 1px;
}

.toc-footer {
  margin-top: auto;
  padding-top: 30px;
  font-size: 11px;
  color: var(--grey-light);
  font-style: italic;
  text-align: center;
}

/* ─────────────────────────────────────────────────────────────
   SECTION DIVIDER PAGES
   ───────────────────────────────────────────────────────────── */
.divider-page {
  position: relative;
  padding: 0 !important;
}

.divider-page .divider-bg {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: 45% 55%;
}

.divider-left {
  background: var(--divider-pale);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.divider-right {
  background: var(--paper);
  padding: 60px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
}

.divider-stripe {
  position: absolute;
  left: 45%;
  top: 0;
  bottom: 0;
  width: 8px;
  background: var(--divider-primary);
  transform: translateX(-4px);
}

.divider-icon {
  width: 140px;
  height: 140px;
  color: var(--divider-primary);
}

.divider-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--divider-primary);
  margin-bottom: 12px;
}

.divider-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 48px;
  color: var(--divider-primary);
  letter-spacing: -2px;
  line-height: 1.05;
  margin-bottom: 16px;
  font-variation-settings: "opsz" 144;
}

.divider-subtitle {
  font-size: 15px;
  color: var(--ink-soft);
  margin-bottom: 32px;
  line-height: 1.5;
  max-width: 90%;
}

.divider-ecg {
  width: 80%;
  height: 50px;
}

.divider-ecg path {
  fill: none;
  stroke: var(--divider-primary);
  stroke-width: 2;
  stroke-linecap: round;
  opacity: 0.6;
}

.divider-cta {
  margin-top: 24px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--grey);
}

/* Role-specific divider colors */
.theme-admin {
  --divider-primary: var(--navy-700);
  --divider-pale: var(--navy-50);
}

.theme-doctor {
  --divider-primary: var(--medical-green-deep);
  --divider-pale: var(--medical-green-pale);
}

.theme-nurse {
  --divider-primary: var(--teal);
  --divider-pale: var(--teal-pale);
}

.theme-professor {
  --divider-primary: var(--purple);
  --divider-pale: var(--purple-pale);
}

/* ─────────────────────────────────────────────────────────────
   CONTENT PAGES (per role)
   ───────────────────────────────────────────────────────────── */
.content-page {
  padding: 50px 40px 36px !important;
  overflow-y: hidden;
}

.content-page::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: var(--theme-color, var(--navy-700));
}

.content-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--theme-color, var(--navy-700));
  margin-bottom: 8px;
}

.content-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 30px;
  letter-spacing: -0.5px;
  color: var(--navy-900);
  margin-bottom: 6px;
  line-height: 1.1;
}

.content-intro {
  font-size: 13px;
  color: var(--grey);
  font-style: italic;
  margin-bottom: 22px;
  line-height: 1.4;
}

.content-page h3 {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  color: var(--theme-color, var(--navy-800));
  margin-top: 18px;
  margin-bottom: 8px;
  letter-spacing: -0.2px;
}

.content-page h3:first-of-type {
  margin-top: 4px;
}

.content-page p,
.content-page li {
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--ink-soft);
  margin-bottom: 6px;
}

.content-page ol,
.content-page ul {
  padding-left: 20px;
  margin-bottom: 10px;
}

.content-page strong {
  color: var(--ink);
  font-weight: 600;
}

.content-page .credit-cost {
  color: var(--theme-color, var(--navy-700));
  font-weight: 600;
  font-family: var(--font-mono);
  font-size: 11.5px;
  padding: 1px 6px;
  background: rgba(0, 102, 204, 0.08);
  border-radius: 3px;
  margin-left: 4px;
}

.callout-important {
  background: linear-gradient(135deg, rgba(211,47,47,0.06), rgba(211,47,47,0.02));
  border-left: 3px solid var(--emergency);
  padding: 10px 14px;
  margin: 12px 0;
  border-radius: 0 6px 6px 0;
}

.callout-important p {
  font-size: 12px !important;
  color: var(--emergency) !important;
  font-weight: 500;
  margin-bottom: 0 !important;
  line-height: 1.45;
}

.tool-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin: 10px 0 14px;
}

.tool-item {
  background: var(--paper-shade);
  border-radius: 6px;
  padding: 10px 12px;
  border-left: 3px solid var(--theme-color, var(--navy-700));
}

.tool-name {
  font-weight: 600;
  font-size: 12.5px;
  color: var(--navy-900);
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.tool-name .credit-cost {
  font-size: 10px;
  margin-left: 0;
}

.tool-desc {
  font-size: 11.5px;
  color: var(--grey);
  line-height: 1.4;
}

/* Themes for content pages */
.theme-admin-content { --theme-color: var(--navy-700); }
.theme-doctor-content { --theme-color: var(--medical-green-deep); }
.theme-nurse-content { --theme-color: var(--teal); }
.theme-professor-content { --theme-color: var(--purple); }
.theme-support-content { --theme-color: var(--navy-800); }

/* ─────────────────────────────────────────────────────────────
   FINAL THANK YOU PAGE
   ───────────────────────────────────────────────────────────── */
.thank-you-page {
  background: linear-gradient(135deg, var(--navy-900), var(--navy-800));
  color: white;
  display: flex !important;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 50px !important;
}

.thank-you-page .ty-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--monitor-green);

/* ─────────────────────────────────────────────────────────────
   CONTROLS (bottom bar)
   ───────────────────────────────────────────────────────────── */
.controls {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 18px 24px;
  background: linear-gradient(0deg, rgba(0,15,30,0.95) 0%, rgba(0,15,30,0.7) 100%);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(0, 255, 136, 0.15);
}

.btn {
  background: rgba(0, 255, 136, 0.08);
  border: 1px solid rgba(0, 255, 136, 0.3);
  color: var(--monitor-green);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 10px 18px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s ease;
  font-weight: 600;
}

.btn:hover:not(:disabled) {
  background: rgba(0, 255, 136, 0.15);
  border-color: var(--monitor-green);
  box-shadow: 0 0 20px rgba(0,255,136,0.25);
}

.btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.btn-icon {
  width: 14px;
  height: 14px;
  fill: currentColor;
}

.progress-track {
  width: min(40vw, 240px);
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: linear-gradient(90deg, var(--monitor-green), var(--monitor-cyan));
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 12px rgba(0,255,136,0.5);
}

/* ─────────────────────────────────────────────────────────────
   MOBILE — single page view
   ───────────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .book {
    aspect-ratio: 3 / 4;
    height: min(78vh, 700px);
  }

  .page {
    width: 100%;
    transform-origin: center center !important;
  }

  .page.right {
    left: 0;
    display: none;
  }

  .page.left.flipped {
    transform: rotateY(180deg);
  }

  .divider-page .divider-bg {
    grid-template-columns: 1fr;
    grid-template-rows: 40% 60%;
  }

  .divider-stripe {
    left: 0;
    right: 0;
    top: 40%;
    bottom: auto;
    width: 100%;
    height: 6px;
    transform: translateY(-3px);
  }

  .divider-icon {
    width: 80px;
    height: 80px;
  }

  .divider-title {
    font-size: 30px;
  }

  .cover-title {
    font-size: 56px;
  }

  .toc-title {
    font-size: 36px;
  }

  .content-page {
    padding: 40px 24px 30px !important;
  }

  .content-title {
    font-size: 24px;
  }

  .vitals-row {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* Hide controls on touch devices to give more space (use swipe) */
@media (hover: none) and (pointer: coarse) {
  .controls .btn-text {
    display: none;
  }
}

/* Initial load animation */
.book {
  animation: bookEnter 1s cubic-bezier(0.4, 0, 0.2, 1) backwards;
}

@keyframes bookEnter {
  from {
    opacity: 0;
    transform: scale(0.96) translateY(10px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

/* Hide non-active pages for performance */
.page.hidden {
  display: none;
}

/* ─────────────────────────────────────────────────────────────
   LOAD OVERLAY
   ───────────────────────────────────────────────────────────── */
.loader {
  position: fixed;
  inset: 0;
  background: #0a0f1a;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity 0.6s ease, visibility 0.6s ease;
}

.loader.hidden {
  opacity: 0;
  visibility: hidden;
}

.loader-content {
  text-align: center;
  color: var(--monitor-green);
}

.loader-pulse {
  width: 60px;
  height: 60px;
  margin: 0 auto 16px;
  border: 2px solid rgba(0,255,136,0.2);
  border-top-color: var(--monitor-green);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loader-text {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
}

// ────────────────────────────────────────────────────────────
// FLIPBOOK ENGINE
// ────────────────────────────────────────────────────────────
class Flipbook {
  constructor() {
    this.currentPage = 0;
    this.totalPages = PAGES.length;
    this.book = document.getElementById('book');
    this.pageIndicator = document.getElementById('pageIndicator');
    this.progressFill = document.getElementById('progressFill');
    this.firstBtn = document.getElementById('firstBtn');
    this.prevBtn = document.getElementById('prevBtn');
    this.nextBtn = document.getElementById('nextBtn');
    this.lastBtn = document.getElementById('lastBtn');

    this.isMobile = window.matchMedia('(max-width: 768px)').matches;
    this.isAnimating = false;

    this.init();
  }

  init() {
    this.renderPages();
    this.bindEvents();
    this.updateView();

    // Hide loader after a beat
    setTimeout(() => {
      document.getElementById('loader').classList.add('hidden');
    }, 600);
  }

  renderPages() {
    this.book.innerHTML = '';

    if (this.isMobile) {
      // Mobile: single page view, all pages stacked
      PAGES.forEach((page, i) => {
        const pageEl = document.createElement('div');
        pageEl.className = `page left`;
        pageEl.dataset.index = i;
        pageEl.innerHTML = `
          <div class="page-face front">
            ${page.html}
          </div>
        `;
        pageEl.style.zIndex = this.totalPages - i;
        if (i !== 0) pageEl.classList.add('hidden');
        this.book.appendChild(pageEl);
      });
    } else {
      // Desktop: spread view (two pages side by side)
      // We'll render one "spread" at a time, replacing on flip
      for (let i = 0; i < this.totalPages; i++) {
        const pageEl = document.createElement('div');
        const isRight = i % 2 === 0; // page 0 (cover) goes right, then left/right alternate? Actually:
        // Conventional book: page 0 = cover (right-side first time you see it)
        // page 1 = inside-left, page 2 = inside-right, etc.
        // For simplicity: even indices on right, odd on left
        pageEl.className = `page ${i % 2 === 0 ? 'right' : 'left'}`;
        pageEl.dataset.index = i;
        pageEl.innerHTML = `
          <div class="page-face front">${PAGES[i].html}</div>
        `;
        pageEl.style.zIndex = this.totalPages - Math.abs(i - this.currentPage);

        if (i < this.currentPage - 1 || i > this.currentPage + 1) {
          pageEl.classList.add('hidden');
        }

        this.book.appendChild(pageEl);
      }
    }
  }

  bindEvents() {
    this.firstBtn.addEventListener('click', () => this.goTo(0));
    this.prevBtn.addEventListener('click', () => this.prev());
    this.nextBtn.addEventListener('click', () => this.next());
    this.lastBtn.addEventListener('click', () => this.goTo(this.totalPages - 1));

    // TOC entries
    document.addEventListener('click', (e) => {
      const entry = e.target.closest('.toc-entry');
      if (entry) {
        const target = parseInt(entry.dataset.target, 10);
        this.goTo(target);
      }
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') {
        e.preventDefault();
        this.next();
      } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        e.preventDefault();
        this.prev();
      } else if (e.key === 'Home') {
        this.goTo(0);
      } else if (e.key === 'End') {
        this.goTo(this.totalPages - 1);
      }
    });

    // Touch swipe
    let touchStartX = 0;
    let touchStartY = 0;
    this.book.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    this.book.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
        if (dx > 0) this.prev();
        else this.next();
      }
    }, { passive: true });

    // Click to flip (click on page edge)
    this.book.addEventListener('click', (e) => {
      if (e.target.closest('.toc-entry')) return;
      if (e.target.closest('button')) return;
      const rect = this.book.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const width = rect.width;
      if (this.isMobile) {
        if (clickX > width / 2) this.next();
        else this.prev();
      } else {
        if (clickX > width * 0.65) this.next();
        else if (clickX < width * 0.35) this.prev();
      }
    });

    // Resize handler
    window.addEventListener('resize', () => {
      const wasMobile = this.isMobile;
      this.isMobile = window.matchMedia('(max-width: 768px)').matches;
      if (wasMobile !== this.isMobile) {
        this.renderPages();
        this.updateView();
      }
    });
  }

  next() {
    if (this.isAnimating) return;
    if (this.currentPage < this.totalPages - 1) {
      this.goTo(this.currentPage + 1);
    }
  }

  prev() {
    if (this.isAnimating) return;
    if (this.currentPage > 0) {
      this.goTo(this.currentPage - 1);
    }
  }

  goTo(index) {
    if (this.isAnimating) return;
    if (index < 0 || index >= this.totalPages) return;
    if (index === this.currentPage) return;

    this.isAnimating = true;
    this.currentPage = index;
    this.updateView();

    setTimeout(() => {
      this.isAnimating = false;
    }, 600);
  }

  updateView() {
    // Update page visibility (show current + neighbors for performance)
    const allPages = this.book.querySelectorAll('.page');
    allPages.forEach(p => {
      const i = parseInt(p.dataset.index, 10);
      if (Math.abs(i - this.currentPage) <= 2) {
        p.classList.remove('hidden');
      } else {
        p.classList.add('hidden');
      }
      // Z-index management
      p.style.zIndex = this.totalPages - Math.abs(i - this.currentPage);
    });

    // Indicator
    const num = String(this.currentPage + 1).padStart(2, '0');
    const total = String(this.totalPages).padStart(2, '0');
    this.pageIndicator.textContent = `${num} / ${total}`;

    // Progress bar
    const pct = ((this.currentPage + 1) / this.totalPages) * 100;
    this.progressFill.style.width = pct + '%';

    // Buttons
    this.prevBtn.disabled = this.currentPage === 0;
    this.firstBtn.disabled = this.currentPage === 0;
    this.nextBtn.disabled = this.currentPage === this.totalPages - 1;
    this.lastBtn.disabled = this.currentPage === this.totalPages - 1;
  }
}

// Boot
document.addEventListener('DOMContentLoaded', () => {
  new Flipbook();
});
</script>
