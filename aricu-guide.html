<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="theme-color" content="#003D7A" />
<title>ARICU User Guides — Pilot Hospital Onboarding</title>
<meta name="description" content="ARICU pilot hospital onboarding guides. By Dr. Atul Rai, M.D." />

<!-- StPageFlip library for realistic page-curl animation -->
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --navy-900: #001F3D;
  --navy-800: #003D7A;
  --navy-700: #0066CC;
  --navy-500: #4A9FE6;
  --navy-100: #E3F2FD;
  --navy-50:  #F0F7FF;
  --monitor-green: #00FF88;
  --monitor-yellow: #FFEB3B;
  --monitor-cyan: #00BCD4;
  --monitor-orange: #FF9800;
  --medical-green: #00A86B;
  --medical-green-pale: #E8F5E9;
  --medical-green-deep: #006B3F;
  --teal: #00897B;
  --teal-pale: #E0F2F1;
  --teal-light: #4DB6AC;
  --purple: #7B1FA2;
  --purple-pale: #F3E5F5;
  --purple-light: #BA68C8;
  --emergency: #D32F2F;
  --warning: #F57C00;
  --ink: #0A1929;
  --ink-soft: #2A3B4D;
  --grey: #5A6878;
  --grey-light: #A8B2BD;
  --paper: #FCFCFA;
  --paper-shade: #F5F4F0;
  --paper-edge: #E8E6E0;
  --font-display: "Fraunces", "Iowan Old Style", Georgia, serif;
  --font-body: "Inter Tight", system-ui, -apple-system, sans-serif;
  --font-mono: "JetBrains Mono", "Courier New", monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: #0a0f1a;
  font-family: var(--font-body);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at top, #102844 0%, transparent 60%),
    radial-gradient(ellipse at bottom right, #0a1f3a 0%, transparent 50%),
    linear-gradient(135deg, #0a0f1a 0%, #0d1424 100%);
  z-index: 0;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0, 255, 136, 0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 255, 136, 0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: 0;
  pointer-events: none;
}

.app-chrome {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  background: linear-gradient(180deg, rgba(0,15,30,0.95) 0%, rgba(0,15,30,0.7) 100%);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0, 255, 136, 0.15);
}

.brand-mark {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 22px;
  letter-spacing: -0.5px;
  color: white;
}

.brand-sub {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--monitor-green);
  font-weight: 500;
}

.page-indicator {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--monitor-green);
  letter-spacing: 1px;
  padding: 4px 10px;
  border: 1px solid rgba(0, 255, 136, 0.3);
  border-radius: 3px;
  background: rgba(0, 255, 136, 0.05);
}

.book-stage {
  position: fixed;
  top: 60px;
  bottom: 80px;
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

#book {
  margin: 0 auto;
}

.flip-page {
  background: var(--paper);
  overflow: hidden;
  font-family: var(--font-body);
  color: var(--ink);
  position: relative;
}

.page-content {
  position: absolute;
  inset: 0;
  padding: clamp(16px, 3vw, 36px);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.page-number {
  position: absolute;
  bottom: 14px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--grey-light);
  text-transform: uppercase;
  z-index: 3;
}
.page-number.left { left: 22px; }
.page-number.right { right: 22px; }

.page-mini-header {
  position: absolute;
  top: 14px;
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--grey-light);
  z-index: 3;
}
.page-mini-header.left { left: 22px; }
.page-mini-header.right { right: 22px; }

/* COVER */
.cover {
  background: linear-gradient(135deg, var(--navy-900) 0%, var(--navy-800) 50%, #002F5C 100%) !important;
  color: white;
  position: relative;
  height: 100%;
}

.cover::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
  background-size: 22px 22px;
  z-index: 0;
}

.cover .page-content {
  z-index: 2;
  justify-content: space-between;
  padding: 28px 22px;
}

.cover-corner {
  display: flex;
  justify-content: space-between;
}

.cover-corner-mark {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(0,255,136,0.6);
  text-transform: uppercase;
}

.cover-center {
  text-align: center;
  margin: auto 0;
}

.cover-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(44px, 11vw, 78px);
  line-height: 0.95;
  letter-spacing: -2.5px;
  color: white;
  margin-bottom: 8px;
}

.cover-tagline {
  font-size: clamp(9px, 1.6vw, 12px);
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  font-weight: 500;
  margin-bottom: 18px;
}

.ecg-strip { width: 100%; height: 46px; margin: 14px 0; }
.ecg-strip svg { width: 100%; height: 100%; display: block; }
.ecg-line {
  fill: none;
  stroke: var(--monitor-green);
  stroke-width: 2;
  stroke-linecap: round;
  filter: drop-shadow(0 0 4px rgba(0,255,136,0.6));
}

.vitals-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin: 14px 0;
}

.vital-chip {
  background: #000;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  padding: 6px 8px;
  text-align: left;
  font-family: var(--font-mono);
  position: relative;
  overflow: hidden;
}

.vital-chip::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(to right, transparent, currentColor, transparent);
  opacity: 0.5;
}

.vital-label {
  font-size: 7px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 2px;
}

.vital-value {
  font-size: clamp(12px, 2.5vw, 16px);
  font-weight: 600;
  line-height: 1;
}

.vital-unit {
  font-size: 7px;
  color: rgba(255,255,255,0.4);
  margin-top: 2px;
}

.vital-hr { color: var(--monitor-green); }
.vital-bp { color: var(--monitor-yellow); }
.vital-spo2 { color: var(--monitor-cyan); }
.vital-rr { color: var(--monitor-orange); }

.cover-bottom { text-align: center; }

.cover-by {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 3px;
  color: rgba(0,255,136,0.6);
  margin-bottom: 4px;
  text-transform: uppercase;
}

.cover-author {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(20px, 4vw, 26px);
  color: white;
  margin-bottom: 2px;
  letter-spacing: -0.6px;
}

.cover-credentials {
  font-size: 10px;
  color: var(--monitor-green);
  letter-spacing: 1.8px;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 8px;
}

.cover-role {
  font-size: 9px;
  color: rgba(255,255,255,0.55);
  font-style: italic;
  margin-bottom: 14px;
}

.cover-badge {
  display: inline-block;
  background: linear-gradient(135deg, var(--medical-green), var(--medical-green-deep));
  color: white;
  padding: 9px 18px;
  border-radius: 22px;
  margin-top: 4px;
  box-shadow: 0 6px 20px rgba(0,168,107,0.4);
}

.cover-badge-title {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.6px;
  margin-bottom: 2px;
}

.cover-badge-terms {
  font-size: 8px;
  font-weight: 400;
  letter-spacing: 0.3px;
  opacity: 0.95;
}

.cover-contact {
  margin-top: 12px;
  font-size: 8px;
  color: rgba(255,255,255,0.55);
}

.cover-contact span { color: var(--monitor-green); }

/* TOC */
.toc-page { padding: 44px 30px 36px !important; }

.toc-eyebrow {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--navy-700);
  margin-bottom: 6px;
}

.toc-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(30px, 5vw, 42px);
  color: var(--navy-900);
  letter-spacing: -1.5px;
  line-height: 1;
  margin-bottom: 4px;
}

.toc-sub {
  font-size: 11px;
  color: var(--grey);
  margin-bottom: 22px;
  font-style: italic;
}

.toc-list {
  display: flex;
  flex-direction: column;
}

.toc-entry {
  display: grid;
  grid-template-columns: 38px 1fr auto;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--paper-edge);
  cursor: pointer;
  transition: padding-left 0.2s ease;
}

.toc-entry:hover { padding-left: 6px; }

.toc-num {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 20px;
  color: var(--toc-color, var(--navy-700));
}

.toc-text strong {
  display: block;
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 600;
  color: var(--toc-color, var(--navy-800));
  margin-bottom: 2px;
}

.toc-text span {
  font-size: 10px;
  color: var(--grey);
}

.toc-page-num {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--grey);
}

/* DIVIDERS */
.divider-page {
  position: relative;
  padding: 0 !important;
  height: 100%;
}

.divider-bg {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: 42% 58%;
}

.divider-left {
  background: var(--divider-pale);
  display: flex;
  align-items: center;
  justify-content: center;
}

.divider-right {
  background: var(--paper);
  padding: 36px 22px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.divider-stripe {
  position: absolute;
  left: 42%;
  top: 0; bottom: 0;
  width: 6px;
  background: var(--divider-primary);
  transform: translateX(-3px);
}

.divider-icon {
  width: clamp(70px, 14vw, 110px);
  height: clamp(70px, 14vw, 110px);
  color: var(--divider-primary);
}

.divider-eyebrow {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--divider-primary);
  margin-bottom: 10px;
}

.divider-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(26px, 5vw, 38px);
  color: var(--divider-primary);
  letter-spacing: -1.3px;
  line-height: 1.05;
  margin-bottom: 10px;
}

.divider-subtitle {
  font-size: 12px;
  color: var(--ink-soft);
  margin-bottom: 20px;
  line-height: 1.5;
}

.divider-ecg { width: 85%; height: 36px; }
.divider-ecg path {
  fill: none;
  stroke: var(--divider-primary);
  stroke-width: 2;
  stroke-linecap: round;
  opacity: 0.5;
}

.divider-cta {
  margin-top: 16px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--grey);
}

.theme-admin { --divider-primary: var(--navy-700); --divider-pale: var(--navy-50); }
.theme-doctor { --divider-primary: var(--medical-green-deep); --divider-pale: var(--medical-green-pale); }
.theme-nurse { --divider-primary: var(--teal); --divider-pale: var(--teal-pale); }
.theme-professor { --divider-primary: var(--purple); --divider-pale: var(--purple-pale); }

/* CONTENT */
.content-page {
  padding: 36px 24px 26px !important;
  overflow-y: hidden;
}

.content-page::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 5px;
  background: var(--theme-color, var(--navy-700));
}

.content-eyebrow {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--theme-color, var(--navy-700));
  margin-bottom: 6px;
}

.content-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(20px, 3.5vw, 24px);
  color: var(--navy-900);
  margin-bottom: 4px;
  line-height: 1.1;
}

.content-intro {
  font-size: 11px;
  color: var(--grey);
  font-style: italic;
  margin-bottom: 14px;
  line-height: 1.4;
}

.content-page h3 {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  color: var(--theme-color, var(--navy-800));
  margin-top: 12px;
  margin-bottom: 5px;
}

.content-page h3:first-of-type { margin-top: 2px; }

.content-page p,
.content-page li {
  font-size: 10.5px;
  line-height: 1.5;
  color: var(--ink-soft);
  margin-bottom: 3px;
}

.content-page ol,
.content-page ul {
  padding-left: 16px;
  margin-bottom: 6px;
}

.content-page strong {
  color: var(--ink);
  font-weight: 600;
}

.credit-cost {
  color: var(--theme-color, var(--navy-700));
  font-weight: 600;
  font-family: var(--font-mono);
  font-size: 9.5px;
  padding: 1px 5px;
  background: rgba(0, 102, 204, 0.08);
  border-radius: 3px;
}

.callout-important {
  background: linear-gradient(135deg, rgba(211,47,47,0.06), rgba(211,47,47,0.02));
  border-left: 3px solid var(--emergency);
  padding: 7px 11px;
  margin: 8px 0;
  border-radius: 0 5px 5px 0;
}

.callout-important p {
  font-size: 10px !important;
  color: var(--emergency) !important;
  font-weight: 500;
  margin-bottom: 0 !important;
  line-height: 1.4;
}

.tool-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin: 6px 0 10px;
}

.tool-item {
  background: var(--paper-shade);
  border-radius: 5px;
  padding: 7px 9px;
  border-left: 3px solid var(--theme-color, var(--navy-700));
}

.tool-name {
  font-weight: 600;
  font-size: 10.5px;
  color: var(--navy-900);
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.tool-name .credit-cost { font-size: 9px; }

.tool-desc {
  font-size: 9.5px;
  color: var(--grey);
  line-height: 1.4;
}

.theme-admin-content { --theme-color: var(--navy-700); }
.theme-doctor-content { --theme-color: var(--medical-green-deep); }
.theme-nurse-content { --theme-color: var(--teal); }
.theme-professor-content { --theme-color: var(--purple); }

/* THANK YOU */
.thank-you-page {
  background: linear-gradient(135deg, var(--navy-900), var(--navy-800)) !important;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 36px 26px !important;
  height: 100%;
}

.ty-eyebrow {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--monitor-green);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.thank-you-page h2 {
  font-family: var(--font-display);
  font-size: clamp(22px, 4.5vw, 32px);
  font-weight: 600;
  letter-spacing: -1px;
  line-height: 1.15;
  margin-bottom: 16px;
  color: white;
}

.thank-you-page p {
  font-size: 11px;
  color: rgba(255,255,255,0.75);
  line-height: 1.55;
  max-width: 90%;
  margin: 0 auto 14px;
}

.ty-signature {
  margin-top: 18px;
  padding-top: 18px;
  border-top: 1px solid rgba(0,255,136,0.2);
}

.ty-name {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  color: white;
  margin-bottom: 2px;
}

.ty-cred {
  font-size: 9px;
  color: var(--monitor-green);
  letter-spacing: 1.8px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.ty-contact {
  font-size: 9px;
  color: rgba(255,255,255,0.5);
}

/* CONTROLS */
.controls {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 16px 20px;
  background: linear-gradient(0deg, rgba(0,15,30,0.95) 0%, rgba(0,15,30,0.7) 100%);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(0, 255, 136, 0.15);
}

.btn {
  background: rgba(0, 255, 136, 0.08);
  border: 1px solid rgba(0, 255, 136, 0.3);
  color: var(--monitor-green);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 9px 14px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s ease;
  font-weight: 600;
}

.btn:hover:not(:disabled) {
  background: rgba(0, 255, 136, 0.15);
  border-color: var(--monitor-green);
  box-shadow: 0 0 16px rgba(0,255,136,0.25);
}

.btn:disabled { opacity: 0.3; cursor: not-allowed; }

.progress-track {
  width: min(40vw, 220px);
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  background: linear-gradient(90deg, var(--monitor-green), var(--monitor-cyan));
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 12px rgba(0,255,136,0.5);
}

@media (max-width: 600px) {
  .btn-text-long { display: none; }
}

/* LOADER */
.loader {
  position: fixed;
  inset: 0;
  background: #0a0f1a;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity 0.6s ease, visibility 0.6s ease;
}

.loader.hidden { opacity: 0; visibility: hidden; }

.loader-pulse {
  width: 50px;
  height: 50px;
  margin: 0 auto 14px;
  border: 2px solid rgba(0,255,136,0.2);
  border-top-color: var(--monitor-green);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loader-text {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--monitor-green);
  text-align: center;
}

.stf__parent { margin: 0 auto; }
.stf__block { background: var(--paper); }
</style>
</head>
<body>

<div class="loader" id="loader">
  <div>
    <div class="loader-pulse"></div>
    <div class="loader-text">Initializing ARICU</div>
  </div>
</div>

<div class="app-chrome">
  <div>
    <div class="brand-mark">ARICU</div>
    <div class="brand-sub">by Dr. Atul Rai, M.D.</div>
  </div>
  <div class="page-indicator" id="pageIndicator">01 / 17</div>
</div>

<div class="book-stage">
  <div id="book"></div>
</div>

document.addEventListener('DOMContentLoaded', () => {
  const bookEl = document.getElementById('book');

  PAGES_HTML.forEach((html) => {
    const page = document.createElement('div');
    page.className = 'flip-page';
    page.innerHTML = html;
    bookEl.appendChild(page);
  });

  function getBookDims() {
    const stageHeight = window.innerHeight - 60 - 80;
    const stageWidth = window.innerWidth;
    const isMobile = window.innerWidth < 768;

    let pageHeight, pageWidth;
    if (isMobile) {
      pageHeight = Math.min(stageHeight - 30, 720);
      pageWidth = Math.min(stageWidth - 30, pageHeight * 0.7);
    } else {
      pageHeight = Math.min(stageHeight - 40, 780);
      pageWidth = Math.min((stageWidth - 60) / 2, pageHeight * 0.72);
    }

    return { width: pageWidth, height: pageHeight, isMobile };
  }

  const dims = getBookDims();

  const pageFlip = new St.PageFlip(bookEl, {
    width: dims.width,
    height: dims.height,
    size: 'fixed',
    minWidth: 280,
    maxWidth: 700,
    minHeight: 400,
    maxHeight: 900,
    maxShadowOpacity: 0.5,
    showCover: true,
    mobileScrollSupport: false,
    swipeDistance: 30,
    clickEventForward: true,
    useMouseEvents: true,
    drawShadow: true,
    flippingTime: 800,
    usePortrait: dims.isMobile,
    autoSize: false,
  });

  pageFlip.loadFromHTML(document.querySelectorAll('.flip-page'));

  const pageIndicator = document.getElementById('pageIndicator');
  const progressFill = document.getElementById('progressFill');
  const firstBtn = document.getElementById('firstBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const lastBtn = document.getElementById('lastBtn');

  function updateChrome() {
    const current = pageFlip.getCurrentPageIndex();
    const total = pageFlip.getPageCount();
    pageIndicator.textContent = `${String(current + 1).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;
    progressFill.style.width = `${((current + 1) / total) * 100}%`;
    prevBtn.disabled = current === 0;
    firstBtn.disabled = current === 0;
    nextBtn.disabled = current >= total - 1;
    lastBtn.disabled = current >= total - 1;
  }

  pageFlip.on('flip', updateChrome);
  pageFlip.on('init', updateChrome);

  firstBtn.addEventListener('click', () => pageFlip.turnToPage(0));
  prevBtn.addEventListener('click', () => pageFlip.flipPrev());
  nextBtn.addEventListener('click', () => pageFlip.flipNext());
  lastBtn.addEventListener('click', () => pageFlip.turnToPage(pageFlip.getPageCount() - 1));

  document.addEventListener('click', (e) => {
    const entry = e.target.closest('.toc-entry');
    if (entry) {
      const target = parseInt(entry.dataset.target, 10);
      pageFlip.flip(target);
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') {
      e.preventDefault();
      pageFlip.flipNext();
    } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
      e.preventDefault();
      pageFlip.flipPrev();
    } else if (e.key === 'Home') {
      pageFlip.turnToPage(0);
    } else if (e.key === 'End') {
      pageFlip.turnToPage(pageFlip.getPageCount() - 1);
    }
  });

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const newDims = getBookDims();
      pageFlip.update({
        width: newDims.width,
        height: newDims.height,
        usePortrait: newDims.isMobile,
      });
    }, 200);
  });

  updateChrome();

  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
  }, 800);
});
</script>

</body>
</html>
